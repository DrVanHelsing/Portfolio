<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- < left bracket -->
  <polyline points="10,10 5,16 10,22" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <line x1="15.5" y1="22" x2="17.5" y2="10" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- > right bracket -->
  <polyline points="22,10 27,16 22,22" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

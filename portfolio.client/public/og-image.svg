<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#e8e8ed;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orb top-right -->
  <radialGradient id="orb" cx="80%" cy="20%" r="40%">
    <stop offset="0%" style="stop-color:#0071e3;stop-opacity:0.18"/>
    <stop offset="100%" style="stop-color:#0071e3;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#orb)"/>

  <!-- Accent stripe -->
  <rect x="80" y="480" width="1040" height="4" rx="2" fill="url(#accent)" opacity="0.85"/>

  <!-- Name -->
  <text x="80" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="url(#nameGrad)" letter-spacing="-2">Tredir Sewpaul</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#8e8e93" letter-spacing="0.2">Computer Science Graduate · AI Engineer · Full-Stack Developer</text>

  <!-- Tech stack -->
  <text x="80" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#0071e3" letter-spacing="1.5">Python  ·  C#  ·  React  ·  Azure  ·  .NET MAUI  ·  ML</text>

  <!-- Domain -->
  <text x="80" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#636366">tredirs.com</text>
</svg>
